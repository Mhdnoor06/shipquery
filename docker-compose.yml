services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: shipquery
      POSTGRES_PASSWORD: shipquery123
      POSTGRES_DB: shipquery
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shipquery"]
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    image: ghcr.io/mhdnoor06/shipquery:latest
    build: .
    restart: unless-stopped
    ports:
      - "3000:3001"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://shipquery:shipquery123@db:5432/shipquery
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads

  prometheus:
    image: prom/prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    depends_on:
      - app

  grafana:
    image: grafana/grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  pgdata:
  uploads:
  prometheus_data:
  grafana_data:
