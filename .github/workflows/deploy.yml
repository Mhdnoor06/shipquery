name: Deploy ShipQuery

on:
  push:
    branches: [main]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/mhdnoor06/shipquery:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Write .env and deploy
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          envs: OPENROUTER_API_KEY,OPENROUTER_API_KEY_2,MISTRAL_API_KEY,MISTRAL_API_KEY_2,GOOGLE_CREDENTIALS
          script: |
            cat <<ENVEOF > ~/shipquery/.env
            DATABASE_URL=postgresql://shipquery:shipquery123@localhost:5432/shipquery
            PORT=3001
            OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
            OPENROUTER_API_KEY_2=${OPENROUTER_API_KEY_2}
            MISTRAL_API_KEY=${MISTRAL_API_KEY}
            MISTRAL_API_KEY_2=${MISTRAL_API_KEY_2}
            GOOGLE_CREDENTIALS=${GOOGLE_CREDENTIALS}
            ENVEOF

            cd shipquery
            git pull origin main

            # Run migrations inside app container
            docker compose pull app
            docker compose up -d db
            sleep 5
            docker compose run --rm -e DATABASE_URL=postgresql://shipquery:shipquery123@db:5432/shipquery app npm run migrate

            # Deploy app
            docker compose up -d
            docker image prune -f
